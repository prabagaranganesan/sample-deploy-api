name: Backend CI / CD

# Phase 1 — test + deploy only (no ProxyHawk Guard yet).
# Phase 2 adds guard checkpoint after deploy-staging.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
      - run: chmod +x gradlew && ./gradlew test

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-wait.yml
    with:
      platform: ${{ vars.STAGING_DEPLOY_PLATFORM || 'render' }}
      expected_sha: ${{ github.sha }}
      api_url: ${{ vars.STAGING_API_URL }}
      environment_label: staging
    secrets:
      DEPLOY_HOOK: ${{ secrets.STAGING_DEPLOY_HOOK }}
      DEPLOY_API_KEY: ${{ secrets.STAGING_DEPLOY_API_KEY }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
